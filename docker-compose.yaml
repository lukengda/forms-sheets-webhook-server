version: "3.8"

services:
  webhook-server:
    build: forms-sheets-webhook-server
    ports:
      - "5001:5000"
    environment:
      # Set a strong secret to protect the public endpoint (leave unset for open access).
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
